<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel Geral da API weldtrack</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #2d3748;
      background-color: #fcfcfc;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }

    p {
      color: #718096;
      margin-top: 0;
      margin-bottom: 24px;
    }

    .menu-botoes {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    button {
      background-color: #af0b10;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: #870a0a;
    }

    button:active {
      transform: scale(0.98);
    }

    button.active {
      background-color: #ff0000;
    }

    hr {
      border: 0;
      border-top: 1px solid #e2e8f0;
      margin: 32px 0;
    }

    #titulo-lista {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 20px;
      font-weight: 600;
      color: #1a202c;
    }

    #resultado {
      background: #1e1e1e;
      color: #f4f4f4;
      padding: 20px;
      border-left: 5px solid #6e0505;
      white-space: pre-wrap;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 14px;
      border-radius: 6px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body>

<h2>Painel weldtrack API</h2>
<p>Escolha o que deseja ver:</p>

<div class="menu-botoes">
  <button onclick="carregarDados('http://localhost:8080/api/soldadores', 'Lista de Soldadores')">Soldadores</button>
  <button onclick="carregarDados('http://localhost:8080/api/registotrabalho', 'Lista de registotrabalho')">RegistoTrabalho</button>
  <button onclick="carregarDados('http://localhost:8080/api/equipamentos', 'Lista de equipamentos')">Equipamentos</button>
  <button onclick="carregarDados('http://localhost:8080/api/consumiveis', 'Lista de consumiveis')">Consumiveis</button>
</div>

<hr>

<h3 id="titulo-lista">Selecione uma opção acima...</h3>
<div id="resultado">Os dados vão aparecer aqui quando clicar num botão.</div>

<script>
  async function carregarDados(caminhoAPI, nomeClasse) {
    const campoResultado = document.getElementById('resultado');
    const campoTitulo = document.getElementById('titulo-lista');

    campoTitulo.innerText = nomeClasse;
    campoResultado.innerText = "A carregar dados...";

    const botoes = document.querySelectorAll('.menu-botoes button');
    botoes.forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');

    try {
      const resposta = await fetch(caminhoAPI);
      if (!resposta.ok) throw new Error(`Erro: ${resposta.status}`);

      const dados = await resposta.json();

      if (dados.length === 0) {
        campoResultado.innerText = `A API ligou com sucesso, mas a lista de [${nomeClasse}] está vazia na Base de Dados.`;
      } else {
        campoResultado.innerText = JSON.stringify(dados, null, 2);
      }
    } catch (erro) {
      campoResultado.innerText = "Erro ao ligar a este endpoint: " + erro.message;
    }
  }
</script>
</body>
</html>
